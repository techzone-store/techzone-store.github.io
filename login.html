<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            min-height: 100vh;
            background: linear-gradient(135deg, #ffcf57, #c62828);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-wrapper{
            width: 100%;
            padding: 20px;
        }

        .login-box{
            max-width: 380px;
            background: #fff;
            padding: 35px 30px;
            border-radius: 10px;
            margin: auto;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
        }

        .login-box h2{
            margin-bottom: 10px;
            color: #333;
        }

        .login-box p{
            font-size: 14px;
            color: #777;
            margin-bottom: 25px;
        }

        .input-group{
            position: relative;
            margin-bottom: 25px;
        }

        .input-group input{
            width: 100%;
            padding: 12px 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
            font-size: 14px;
        }

        .input-group label{
            position: absolute;
            top: 50%;
            left: 10px;
            color: #999;
            font-size: 13px;
            transform: translateY(-50%);
            pointer-events: none;
            transition: 0.3s;
            background: #fff;
            padding: 0 5px;
        }

        .input-group input:focus + label,
        .input-group input:valid + label{
            top: -6px;
            font-size: 12px;
            color: #c62828;
        }

        .login-btn{
            width: 100%;
            padding: 12px;
            background: #c62828;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover{
            background: #a81d1d;
        }

        .links{
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
        }

        .links a{
            font-size: 13px;
            text-decoration: none;
            color: #c62828;
        }

        .links a:hover{
            text-decoration: underline;
        }

        @media (max-width: 480px){
            .login-box{
                padding: 30px 20px;
            }
        }

        @keyframes fadeSlideUp{
    0%{
        opacity: 0;
        transform: translateY(30px);
    }
    100%{
        opacity: 1;
        transform: translateY(0);
    }
}

.login-box{
    animation: fadeSlideUp 0.8s ease-out forwards;
}

    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="login-box">
        <h2>Welcome Back</h2>
        <p>Please login to your account</p>

        <form>
            <div class="input-group">
                <input type="email" required>
                <label>Email</label>
            </div>

            <div class="input-group">
                <input type="password" required>
                <label>Password</label>
            </div>

            <button class="login-btn">Login</button>

            <div class="links">
                <a href="#">Forgot Password?</a>
                <a href="create-account.html">Create Account</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
